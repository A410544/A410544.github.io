    <style>
        body {
            background-color: #1a1a1a;
            color: white;

        .header {
            text-align: center;
            border-bottom: 3px solid #f39c12;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .video-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .video-card {

            border-radius: 15px;

            transform: scale(1.03);
            border-color: #f39c12;
        }

            width: 100%;
            height: 180px;
            background-size: cover;
            background-position: center;
            position: relative;
        }
        .play-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            background: rgba(243, 156, 18, 0.9);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            cursor: pointer;
        }
        .info {
            padding: 15px;
        }
        .title {
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 5px;
            color: #ecf0f1;
        }
        .description {
            font-size: 0.9em;
            color: #bdc3c7;
        }
        a {
            text-decoration: none;
            color: inherit;
        }
    </style>
